            {n: "GOVT MS JHINNA", u: "23120307502", hm: "Sarashwati Mehra", d: "PRATHMIK SHIKSHAK", t: "Middle", c: "pink"},
            {n: "GOVT PS DATLA", u: "23120307701", hm: "Anil Kumar Khare", d: "SAHAYAK SHIKSHAK", t: "Primary", c: "violet"},

            {n: "GOVT PS ADHROUTA", u: "23120307901", hm: "Rajkumar Tripathi", d: "PRATHMIK SHIKSHAK", t: "Primary", c: "indigo"},
            {n: "GOVT PS MAILI", u: "23120318601", hm: "Prahlad Singh Gound", d: "SAHAYAK SHIKSHAK", t: "Primary", c: "emerald"},
            {n: "GOVT PS Pati Shishpur", u: "23120318901", hm: "Raj Laxmi", d: "PRATHMIK SHIKSHAK", t: "Primary", c: "rose"},
            {n: "GOVT MS PATNA KHURD", u: "23120307302", hm: "Vandna Kharya", d: "MADHYMIK SHIKSHAK", t: "Middle", c: "amber"},

            // (Note: Add all 34 here as per previous list)
        ];

        function render(data) {
            const grid = document.getElementById('schoolGrid');
            grid.innerHTML = data.map((s, idx) => `
                <div class="card-animate bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="px-3 py-1 bg-${s.c}-50 text-${s.c}-600 text-[10px] font-black rounded-full uppercase tracking-widest border border-${s.c}-100">U-DISE: ${s.u}</span>
                            <i class="fas fa-university text-slate-200 text-xl"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-800 uppercase mb-8 h-12 overflow-hidden">${s.n}</h3>
                    </div>
                    <button onclick="openModal('${s.n}', '${s.u}', '${s.hm}', '${s.d}', '${s.t}', '${s.c}')" 
                        class="w-full bg-${s.c}-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-${s.c}-100 hover:bg-${s.c}-700 transition uppercase tracking-widest text-xs">
                        View Info <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            `).join('');
        }

        function openModal(name, udise, hm, desig, type, color) {
            const modal = document.getElementById('infoModal');
            const header = document.getElementById('modalHeader');
            
            document.getElementById('mName').innerText = name;
            document.getElementById('mUdise').innerText = 'UDISE: ' + udise;
            document.getElementById('mHm').innerText = hm;
            document.getElementById('mDesig').innerText = desig;
            document.getElementById('mTag').innerText = type;
            
            // Set Modal Header Color dynamically
            header.className = `p-8 text-white relative bg-${color}-600`;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('infoModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function filterSchools() {
            const term = document.getElementById('schoolSearch').value.toLowerCase();
            const filtered = schoolData.filter(s => s.n.toLowerCase().includes(term) || s.u.includes(term));
            render(filtered);
        }

        render(schoolData);
    </script>
